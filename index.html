<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
</head>
<body>
    <header>
        <h1>Dashboard</h1>
        <p>Welcome Back! Here's your financial overview.</p>
        </header>
    <div class="financeBoard">
        <div class="bal">
            <div>Total Balance</div>
            <div>₹24,850</div>
        </div>
        <div class="inc">
            <div>Total Income</div>
            <div>₹45,000</div>
        </div>
        <div class="exp">
            <div>Total Expenses</div>
            <div>₹20,150</div>
        </div>
        <div class="sav">
            <div>Total Saving</div>
            <div>₹24,850</div>
        </div>
    </div>
</body>
</html>
